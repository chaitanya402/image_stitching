version: '3.9'

services:
  # FastAPI Application
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DEBUG=true
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/video_editor
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - AWS_REGION=us-east-1
    depends_on:
      - postgres
      - redis
    volumes:
      - ..:/app
    networks:
      - video_editor_network

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=video_editor
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - video_editor_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - video_editor_network

  # Celery Worker (for async jobs)
  celery_worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: celery -A src.services.celery_app worker --loglevel=info
    environment:
      - DEBUG=true
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/video_editor
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - postgres
      - redis
    volumes:
      - ..:/app
    networks:
      - video_editor_network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]  # Requires docker-compose v1.28.0+ with GPU support

volumes:
  postgres_data:
  redis_data:

networks:
  video_editor_network:
    driver: bridge
